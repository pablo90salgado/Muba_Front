version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: muba_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: muba_user
      POSTGRES_PASSWORD: muba_pass
      POSTGRES_DB: muba_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muba_user -d muba_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: muba_redis_test
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    container_name: muba_adminer_test
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_test_data:
  redis_test_data:
